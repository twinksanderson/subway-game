<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBWAY RUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a1a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Courier New', monospace;
  overflow:hidden;
}
canvas {
  display:block;
  image-rendering:pixelated;
}
#ui-wrap {
  position:relative;
  display:inline-block;
}
#overlay {
  position:absolute;
  inset:0;
  pointer-events:none;
  font-family:'Courier New', monospace;
}
#score-display {
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:22px;
  letter-spacing:4px;
  text-shadow:0 0 10px #f9d71c, 0 0 20px #f9a71c;
}
#coins-display {
  position:absolute;
  top:14px;
  right:14px;
  color:#f9d71c;
  font-size:14px;
  letter-spacing:2px;
  text-shadow:0 0 8px #f9a71c;
}
#multiplier {
  position:absolute;
  top:44px;
  left:50%;
  transform:translateX(-50%);
  color:#ff9f1c;
  font-size:11px;
  letter-spacing:3px;
}

/* Screens */
.screen {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:20;
  font-family:'Courier New', monospace;
}
#title-screen { background:#0a0a1a; }
#title-screen h1 {
  color:#f9d71c;
  font-size:52px;
  letter-spacing:6px;
  text-shadow:0 0 20px #f9a71c, 0 0 40px #f97c1c;
  margin-bottom:6px;
}
#title-screen .sub {
  color:#888;
  font-size:13px;
  letter-spacing:4px;
  margin-bottom:50px;
}
#title-screen .start {
  color:#f9d71c;
  font-size:14px;
  letter-spacing:3px;
  animation:blink 1.2s infinite;
}
#title-screen .controls {
  color:#444;
  font-size:11px;
  letter-spacing:2px;
  margin-top:30px;
  text-align:center;
  line-height:2.2;
}
#death-screen {
  background:rgba(0,0,0,0.88);
  display:none;
}
#death-screen.show { display:flex; }
#death-screen h2 {
  color:#e74c3c;
  font-size:38px;
  letter-spacing:6px;
  text-shadow:0 0 20px #c0392b;
  margin-bottom:10px;
}
#death-stats {
  color:#888;
  font-size:13px;
  letter-spacing:2px;
  margin-bottom:6px;
  text-align:center;
  line-height:2;
}
#best-score {
  color:#f9d71c;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:28px;
  text-shadow:0 0 8px #f9a71c;
}
.restart-btn {
  color:#f9d71c;
  font-size:13px;
  letter-spacing:3px;
  cursor:pointer;
  animation:blink 1.2s infinite;
  pointer-events:all;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#hint { color:#333; font-size:10px; margin-top:8px; letter-spacing:1px; }
</style>
</head>
<body>

<div id="title-screen" class="screen" onclick="startGame()">
  <h1>SUBWAY RUN</h1>
  <div class="sub">— endless runner —</div>
  <div class="start">[ click to run ]</div>
  <div class="controls">
    ← → / A D — zmień tor<br>
    ↑ / W / SPACE — skocz<br>
    ↓ / S — ślizg
  </div>
</div>

<div id="death-screen" class="screen">
  <h2>WIPEOUT</h2>
  <div id="death-stats">score: 0 &nbsp;|&nbsp; coins: 0</div>
  <div id="best-score">best: 0</div>
  <div class="restart-btn" onclick="startGame()">[ try again ]</div>
</div>

<div id="ui-wrap">
  <canvas id="c" width="800" height="520"></canvas>
  <div id="overlay">
    <div id="score-display">0</div>
    <div id="coins-display">🪙 0</div>
    <div id="multiplier">×1</div>
  </div>
</div>

<div id="hint">arrow keys / WASD to play</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const LANES = 3;
const LANE_W = 110;          // world lane width
const HORIZON_Y = H * 0.38;  // where tracks vanish
const GROUND_Y  = H * 0.98;  // bottom of screen
const CAM_PLAYER_Y = H * 0.72; // player feet Y on screen
const PLAYER_H_WORLD = 60;   // player height in world units

// Perspective helpers — map world (laneX, depth) → screen (sx, sy, scale)
// depth: 0 = horizon, 1 = camera
function worldToScreen(laneXWorld, depth) {
  const sy = HORIZON_Y + (CAM_PLAYER_Y - HORIZON_Y) * depth;
  const scale = 0.15 + 0.85 * depth;
  const sx = W / 2 + laneXWorld * scale;
  return { sx, sy, scale };
}

// Lane centers in world X (−LANE_W, 0, +LANE_W)
function laneX(lane) { return (lane - 1) * LANE_W; }

// ── STATE ─────────────────────────────────────────────────────────────────────
let gameRunning = false;
let score = 0, coins = 0, bestScore = 0;
let speed = 0;           // world units / frame advancing depth
let baseSpeed = 0.018;
let spawnTimer = 0;
let spawnInterval = 80;
let coinSpawnTimer = 0;
let distance = 0;        // used for score

let player = {};
let obstacles = [];
let coinItems = [];
let particles = [];
let groundTiles = [];    // repeating ground pattern tiles
let comboTimer = 0;
let multiplier = 1;

// Input
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.key]) handleKeyDown(e.key);
  keys[e.key] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch / swipe
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30) moveLane(1); else if (dx < -30) moveLane(-1);
  } else {
    if (dy < -30) doJump(); else if (dy > 30) doSlide();
  }
}, { passive: true });

function handleKeyDown(key) {
  if (!gameRunning) return;
  if (key === 'ArrowLeft'  || key === 'a' || key === 'A') moveLane(-1);
  if (key === 'ArrowRight' || key === 'd' || key === 'D') moveLane(1);
  if (key === 'ArrowUp'    || key === 'w' || key === 'W' || key === ' ') doJump();
  if (key === 'ArrowDown'  || key === 's' || key === 'S') doSlide();
}

function moveLane(dir) {
  const target = Math.max(0, Math.min(2, player.lane + dir));
  if (target !== player.lane) {
    player.lane = target;
    player.targetX = laneX(target);
  }
}
function doJump() {
  if (player.onGround && !player.sliding) {
    player.vy = -14;
    player.onGround = false;
    player.jumped = true;
    spawnParticles(player.x, 0, '#f9d71c', 8);
  }
}
function doSlide() {
  if (player.onGround && !player.sliding) {
    player.sliding = true;
    player.slideTimer = 40;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function resetPlayer() {
  player = {
    lane: 1,
    x: 0,                // world X (lerps to targetX)
    targetX: 0,
    y: 0,                // world Y above ground (0 = standing)
    vy: 0,
    onGround: true,
    sliding: false,
    slideTimer: 0,
    jumped: false,
    hitFlash: 0,
    invincible: 0,
  };
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('death-screen').classList.remove('show');
  resetPlayer();
  obstacles = [];
  coinItems = [];
  particles = [];
  groundTiles = [];
  score = 0; coins = 0; distance = 0;
  speed = baseSpeed;
  spawnTimer = 0; spawnInterval = 80;
  coinSpawnTimer = 0;
  multiplier = 1; comboTimer = 0;
  // Init ground tiles
  for (let i = 0; i < 20; i++) {
    groundTiles.push({ depth: i / 20 });
  }
  gameRunning = true;
}

// ── OBSTACLE / COIN SPAWNING ───────────────────────────────────────────────────
const OBS_TYPES = ['barrier', 'train', 'low_barrier'];

function spawnObstacle() {
  // Pick random pattern
  const type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
  const laneCount = Math.random() < 0.4 ? 2 : 1;

  let lanes = [];
  if (laneCount === 1) {
    lanes = [Math.floor(Math.random() * 3)];
  } else {
    // block 2 of 3 lanes
    const skip = Math.floor(Math.random() * 3);
    lanes = [0,1,2].filter(l => l !== skip);
  }

  for (const l of lanes) {
    obstacles.push({ lane: l, depth: 0, type, passed: false });
  }
}

function spawnCoins() {
  // Spawn a row of 3-5 coins in one lane
  const l = Math.floor(Math.random() * 3);
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    coinItems.push({ lane: l, depth: 0 - i * 0.04, collected: false });
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
let lastT = 0;
function update(t) {
  const dt = Math.min(t - lastT, 50); lastT = t;
  if (!gameRunning) return;

  // Speed ramp
  speed = baseSpeed + distance * 0.000008;
  spawnInterval = Math.max(45, 80 - distance * 0.01);

  distance++;
  score = Math.floor(distance / 10) * multiplier;

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) { spawnTimer = 0; spawnObstacle(); }
  coinSpawnTimer++;
  if (coinSpawnTimer >= 60) { coinSpawnTimer = 0; spawnCoins(); }

  // Player X lerp
  player.x += (player.targetX - player.x) * 0.25;

  // Player jump physics (world Y, gravity)
  if (!player.onGround) {
    player.vy += 0.85;
    player.y += player.vy;
    if (player.y >= 0) { player.y = 0; player.vy = 0; player.onGround = true; player.jumped = false; }
  }

  // Slide timer
  if (player.sliding) {
    player.slideTimer--;
    if (player.slideTimer <= 0) player.sliding = false;
  }

  // Invincibility flash
  if (player.invincible > 0) player.invincible--;

  // Advance obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.depth += speed;
    if (o.depth > 1.15) { obstacles.splice(i, 1); continue; }

    // Pass check
    if (!o.passed && o.depth > 0.92) {
      o.passed = true;
      comboTimer = 60; multiplier = Math.min(8, multiplier + 1);
    }

    // Collision — only near camera
    if (o.depth > 0.8 && o.depth < 1.02 && o.lane === player.lane && player.invincible === 0) {
      const isLow = o.type === 'low_barrier';
      const playerJumping = player.y < -10;
      const playerSliding = player.sliding;

      let hit = false;
      if (isLow) { if (!playerJumping && !playerSliding) hit = true; }
      else        { if (!playerJumping) hit = true; }

      if (hit) { triggerDeath(); return; }
    }
  }

  // Advance coins
  for (let i = coinItems.length - 1; i >= 0; i--) {
    const c = coinItems[i];
    c.depth += speed;
    if (c.depth > 1.15 || c.collected) { coinItems.splice(i, 1); continue; }

    if (c.depth > 0.8 && c.depth < 1.05 && c.lane === player.lane) {
      c.collected = true;
      coins++;
      spawnParticles(player.x, player.y, '#f9d71c', 6);
    }
  }

  // Combo decay
  if (comboTimer > 0) { comboTimer--; }
  else { multiplier = 1; }

  // Ground tiles scroll
  for (const g of groundTiles) {
    g.depth += speed;
    if (g.depth > 1) g.depth -= 1;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.3;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // HUD
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('coins-display').textContent = `🪙 ${coins}`;
  document.getElementById('multiplier').textContent = multiplier > 1 ? `×${multiplier}` : '';
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParticles(wx, wy, color, count) {
  const { sx, sy, scale } = worldToScreen(wx, 0.98);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: sx, y: sy - wy * scale * 0.6,
      vx: (Math.random() - 0.5) * 6,
      vy: -2 - Math.random() * 4,
      color, life: 1
    });
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(t) {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  sky.addColorStop(0, '#05091a');
  sky.addColorStop(1, '#1a1040');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, HORIZON_Y);

  // Background city silhouette
  drawCitySilhouette();

  // Ground
  const ground = ctx.createLinearGradient(0, HORIZON_Y, 0, GROUND_Y);
  ground.addColorStop(0, '#1a1020');
  ground.addColorStop(0.4, '#241830');
  ground.addColorStop(1, '#100c18');
  ctx.fillStyle = ground;
  ctx.fillRect(0, HORIZON_Y, W, GROUND_Y - HORIZON_Y);

  // Track rails
  drawRails();

  // Ground tile lines
  drawGroundTiles();

  // Lane dividers
  drawLaneDividers();

  // Coins
  for (const c of coinItems) {
    if (c.collected) continue;
    const { sx, sy, scale } = worldToScreen(laneX(c.lane), c.depth);
    const r = 8 * scale;
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(sx, sy, r, r * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#f9d71c';
    ctx.fill();
    ctx.strokeStyle = '#c9a000';
    ctx.lineWidth = 1;
    ctx.stroke();
    // shine
    ctx.fillStyle = 'rgba(255,255,200,0.5)';
    ctx.beginPath();
    ctx.ellipse(sx - r * 0.2, sy - r * 0.15, r * 0.35, r * 0.2, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Obstacles
  for (const o of obstacles) {
    drawObstacle(o, t);
  }

  // Player
  drawPlayer(t);

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,10,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function drawCitySilhouette() {
  ctx.fillStyle = '#0d0820';
  // Simple building silhouettes
  const buildings = [
    { x: 30,  w: 60,  h: 80 },
    { x: 100, w: 45,  h: 55 },
    { x: 155, w: 80,  h: 100 },
    { x: 245, w: 50,  h: 65 },
    { x: 305, w: 30,  h: 90 },
    { x: 345, w: 90,  h: 50 },
    { x: 445, w: 55,  h: 110 },
    { x: 510, w: 70,  h: 70 },
    { x: 590, w: 40,  h: 85 },
    { x: 640, w: 65,  h: 55 },
    { x: 715, w: 80,  h: 95 },
  ];
  for (const b of buildings) {
    ctx.fillRect(b.x, HORIZON_Y - b.h, b.w, b.h);
    // windows
    ctx.fillStyle = 'rgba(255,230,100,0.08)';
    for (let wy = HORIZON_Y - b.h + 8; wy < HORIZON_Y - 4; wy += 12) {
      for (let wx = b.x + 6; wx < b.x + b.w - 6; wx += 10) {
        if (Math.sin(wx * 3.7 + wy * 2.1) > 0.3) {
          ctx.fillRect(wx, wy, 5, 7);
        }
      }
    }
    ctx.fillStyle = '#0d0820';
  }
}

function drawRails() {
  // 4 rails (edges of 3 lanes)
  const railXs = [-1.5, -0.5, 0.5, 1.5].map(f => f * LANE_W);
  for (const rx of railXs) {
    const top = worldToScreen(rx, 0);
    const bot = worldToScreen(rx, 1);
    const grad = ctx.createLinearGradient(top.sx, HORIZON_Y, bot.sx, GROUND_Y);
    grad.addColorStop(0, 'rgba(180,130,220,0.1)');
    grad.addColorStop(1, 'rgba(180,130,220,0.6)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(top.sx, HORIZON_Y);
    ctx.lineTo(bot.sx, GROUND_Y);
    ctx.stroke();
  }
}

function drawGroundTiles() {
  for (const g of groundTiles) {
    if (g.depth < 0.05) continue;
    const y = HORIZON_Y + (CAM_PLAYER_Y - HORIZON_Y) * g.depth;
    const left  = worldToScreen(-LANE_W * 1.5, g.depth);
    const right = worldToScreen(LANE_W * 1.5,  g.depth);
    ctx.strokeStyle = `rgba(100,60,140,${0.08 + g.depth * 0.15})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(left.sx,  y);
    ctx.lineTo(right.sx, y);
    ctx.stroke();
  }
}

function drawLaneDividers() {
  // Dashed center lines between lanes
  const dividers = [-LANE_W/2, LANE_W/2];
  for (const dx of dividers) {
    for (let d = 0.1; d < 1; d += 0.12) {
      if ((d * 8 | 0) % 2 === 0) continue;
      const p1 = worldToScreen(dx, d);
      const p2 = worldToScreen(dx, Math.min(1, d + 0.06));
      ctx.strokeStyle = `rgba(200,160,255,${d * 0.25})`;
      ctx.lineWidth = 1.5 * d;
      ctx.beginPath();
      ctx.moveTo(p1.sx, p1.sy);
      ctx.lineTo(p2.sx, p2.sy);
      ctx.stroke();
    }
  }
}

function drawObstacle(o, t) {
  const wx = laneX(o.lane);
  const { sx, sy, scale } = worldToScreen(wx, o.depth);
  const lw = LANE_W * scale * 0.85;

  ctx.save();
  if (o.type === 'train') {
    // Train car — tall, colorful
    const th = 80 * scale;
    const tw = lw * 1.1;
    // Body
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(sx - tw/2, sy - th, tw, th);
    // Stripe
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(sx - tw/2, sy - th * 0.35, tw, th * 0.15);
    // Windows
    ctx.fillStyle = '#85c1e9';
    const ww = tw * 0.28, wh = th * 0.22;
    ctx.fillRect(sx - tw * 0.36, sy - th * 0.78, ww, wh);
    ctx.fillRect(sx + tw * 0.08,  sy - th * 0.78, ww, wh);
    // Wheels
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx - tw/2, sy - 8 * scale, tw, 8 * scale);
    // Outline
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - tw/2, sy - th, tw, th);
    // Warning glow
    const glow = ctx.createRadialGradient(sx, sy - th/2, 0, sx, sy - th/2, tw);
    glow.addColorStop(0, 'rgba(231,76,60,0.15)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(sx - tw, sy - th - 20, tw * 2, th + 40);

  } else if (o.type === 'barrier') {
    // Yellow/black barrier
    const bh = 40 * scale;
    const bw = lw;
    ctx.fillStyle = '#f9d71c';
    ctx.fillRect(sx - bw/2, sy - bh, bw, bh * 0.35);
    // Striped pole
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#f9d71c' : '#e67e22';
      ctx.fillRect(sx - bw/2 + (bw / 4) * i, sy - bh, bw / 4, bh);
    }
    ctx.strokeStyle = '#b7950b';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - bw/2, sy - bh, bw, bh);

  } else if (o.type === 'low_barrier') {
    // Low hurdle — jump OR slide over it
    const bh = 22 * scale;
    const bw = lw;
    ctx.fillStyle = '#e67e22';
    ctx.fillRect(sx - bw/2, sy - bh, bw, bh * 0.4);
    // Legs
    ctx.fillStyle = '#d35400';
    ctx.fillRect(sx - bw * 0.4, sy - bh, bw * 0.08, bh);
    ctx.fillRect(sx + bw * 0.32, sy - bh, bw * 0.08, bh);
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - bw/2, sy - bh, bw, bh * 0.4);
  }
  ctx.restore();
}

function drawPlayer(t) {
  const { sx: px, sy: py, scale } = worldToScreen(player.x, 0.98);

  // Jump offset
  const jumpOff = player.y * scale * 0.8;
  const footY = py + jumpOff;

  // Shadow (always on ground)
  ctx.save();
  ctx.globalAlpha = 0.35 + (player.y < 0 ? 0 : 0);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(px, py, 22 * scale, 6 * scale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const h = PLAYER_H_WORLD * scale;
  const w = 18 * scale;

  ctx.save();
  if (player.invincible > 0 && Math.floor(t / 80) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const baseY = footY;

  if (player.sliding) {
    // Slide pose — flat
    const sh = h * 0.45, sw = w * 1.6;
    // Body
    ctx.fillStyle = '#3498db';
    ctx.fillRect(px - sw/2, baseY - sh, sw, sh * 0.55);
    // Head
    ctx.fillStyle = '#f5b041';
    ctx.beginPath();
    ctx.arc(px + sw * 0.38, baseY - sh * 0.65, sh * 0.45, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(px + sw * 0.42, baseY - sh * 0.72, 4 * scale, 3 * scale);
  } else {
    // Standing/jumping pose
    const torsoH = h * 0.4, legH = h * 0.38, headR = h * 0.18;
    const torsoY = baseY - legH - torsoH;

    // Legs (animate while running)
    const legSwing = player.onGround ? Math.sin(t * 0.018) * 6 * scale : 0;
    ctx.fillStyle = '#2c3e50';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(px - w * 0.15, baseY - legH);
    ctx.lineTo(px - w * 0.35 + legSwing, baseY);
    ctx.lineTo(px - w * 0.15 + legSwing, baseY);
    ctx.lineTo(px, baseY - legH);
    ctx.fill();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(px, baseY - legH);
    ctx.lineTo(px + w * 0.15 - legSwing, baseY);
    ctx.lineTo(px + w * 0.35 - legSwing, baseY);
    ctx.lineTo(px + w * 0.15, baseY - legH);
    ctx.fill();
    // Shoes
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(px - w * 0.42 + legSwing, baseY - 5 * scale, w * 0.38, 5 * scale);
    ctx.fillRect(px + w * 0.04 - legSwing, baseY - 5 * scale, w * 0.38, 5 * scale);

    // Torso (jacket)
    ctx.fillStyle = '#3498db';
    ctx.fillRect(px - w/2, torsoY, w, torsoH);
    // Jacket detail
    ctx.fillStyle = '#2980b9';
    ctx.fillRect(px - w * 0.06, torsoY, w * 0.12, torsoH);
    // Arms (swing opposite to legs)
    ctx.fillStyle = '#3498db';
    const armSwing = player.onGround ? -legSwing : 0;
    ctx.fillRect(px - w * 0.65 + armSwing * 0.5, torsoY + torsoH * 0.1, w * 0.18, torsoH * 0.7);
    ctx.fillRect(px + w * 0.47 - armSwing * 0.5, torsoY + torsoH * 0.1, w * 0.18, torsoH * 0.7);

    // Head
    ctx.fillStyle = '#f5b041';
    ctx.beginPath();
    ctx.arc(px, torsoY - headR * 0.5, headR, 0, Math.PI * 2);
    ctx.fill();
    // Hair
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath();
    ctx.arc(px, torsoY - headR * 0.5, headR, Math.PI, 0);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(px - headR * 0.35, torsoY - headR * 0.5, headR * 0.13, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px + headR * 0.35, torsoY - headR * 0.5, headR * 0.13, 0, Math.PI * 2);
    ctx.fill();
    // Smile
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(px, torsoY - headR * 0.3, headR * 0.3, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  ctx.restore();
}

// ── DEATH ─────────────────────────────────────────────────────────────────────
function triggerDeath() {
  gameRunning = false;
  if (score > bestScore) bestScore = score;
  document.getElementById('death-stats').textContent =
    `score: ${score.toLocaleString()}  ·  coins: ${coins}`;
  document.getElementById('best-score').textContent = `best: ${bestScore.toLocaleString()}`;
  document.getElementById('death-screen').classList.add('show');
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop(t) {
  update(t);
  draw(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
