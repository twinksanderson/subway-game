<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBWAY RUN 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#c { display:block; width:100vw; height:100vh; }

/* HUD */
#hud {
  position:fixed; inset:0; pointer-events:none;
  font-family:'Courier New',monospace;
}
#score {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  color:#fff; font-size:28px; letter-spacing:4px;
  text-shadow:0 0 12px #f9d71c;
}
#coins-hud {
  position:absolute; top:18px; right:18px;
  color:#f9d71c; font-size:16px; letter-spacing:2px;
  text-shadow:0 0 8px #f9a71c;
}
#info-top {
  position:absolute; top:56px; left:50%; transform:translateX(-50%);
  color:rgba(255,200,80,0.7); font-size:11px; letter-spacing:3px;
}

/* Screens */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Courier New',monospace;
  z-index:30;
}
#title {
  background:rgba(0,0,10,0.92);
}
#title h1 {
  color:#f9d71c; font-size:56px; letter-spacing:8px;
  text-shadow:0 0 25px #f9a71c, 0 0 50px #f97c1c;
  margin-bottom:6px;
}
#title .sub { color:#555; font-size:13px; letter-spacing:4px; margin-bottom:50px; }
#title .start {
  color:#f9d71c; font-size:15px; letter-spacing:3px;
  animation:blink 1.2s infinite;
}
#title .ctrl {
  color:#333; font-size:11px; letter-spacing:2px;
  margin-top:28px; text-align:center; line-height:2.4;
}
#gameover {
  background:rgba(0,0,0,0.86);
  display:none;
}
#gameover.show { display:flex; }
#gameover h2 {
  color:#e74c3c; font-size:42px; letter-spacing:6px;
  text-shadow:0 0 20px #c0392b; margin-bottom:12px;
}
#go-stats { color:#888; font-size:13px; letter-spacing:2px; margin-bottom:6px; line-height:2; text-align:center; }
#go-best  { color:#f9d71c; font-size:12px; letter-spacing:2px; margin-bottom:30px; text-shadow:0 0 8px #f9a71c; }
.btn {
  color:#f9d71c; font-size:13px; letter-spacing:3px;
  cursor:pointer; animation:blink 1.2s infinite; pointer-events:all;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="score">0</div>
  <div id="coins-hud">🪙 0</div>
  <div id="info-top"></div>
</div>

<div id="title" class="screen" onclick="startGame()">
  <h1>SUBWAY RUN</h1>
  <div class="sub">— 3D endless runner —</div>
  <div class="start">[ click to run ]</div>
  <div class="ctrl">
    ← → / A D &nbsp;— zmień tor<br>
    ↑ / W / SPACE — skocz<br>
    ↓ / S &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;— ślizg<br>
    <span style="color:#555;font-size:10px">Wskocz na pociąg żeby biec po dachu!</span>
  </div>
</div>

<div id="gameover" class="screen">
  <h2>WIPEOUT</h2>
  <div id="go-stats"></div>
  <div id="go-best"></div>
  <div class="btn" onclick="startGame()">[ try again ]</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER / SCENE ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x08051a);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x08051a, 0.025);

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ── CAMERA ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 300);
camera.position.set(0, 7, -14);
camera.lookAt(0, 1, 10);
resize();

// ── LIGHTS ────────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x251840, 0.8);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffeebb, 1.2);
sun.position.set(5, 20, -10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 200;
sun.shadow.camera.left = sun.shadow.camera.bottom = -30;
sun.shadow.camera.right = sun.shadow.camera.top = 30;
scene.add(sun);

const fillLight = new THREE.PointLight(0x3a1860, 0.6, 40);
fillLight.position.set(-5, 8, 0);
scene.add(fillLight);

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const LANE_W      = 2.8;
const GROUND_Y    = 0;
const TRAIN_H     = 2.8;  // roof height of a short train (rideable)
const TALL_TRAIN_H = 5;   // roof height of tall train (can't ride)
const GRAV        = 52;   // units/s² — snappy jumps
const JUMP_V      = 15;   // initial jump velocity
const PLAYER_H    = 1.6;  // half-height of player box

// Camera right = world -X, so negate to match screen left/right
function laneX(l) { return -(l - 1) * LANE_W; }

// ── MATERIALS ────────────────────────────────────────────────────────────────
const mGround   = new THREE.MeshLambertMaterial({ color: 0x1a1028 });
const mTrack    = new THREE.MeshLambertMaterial({ color: 0x0d0818 });
const mRail     = new THREE.MeshLambertMaterial({ color: 0x5a4090 });
const mPlayer   = new THREE.MeshLambertMaterial({ color: 0x3498db });
const mPlayerH  = new THREE.MeshLambertMaterial({ color: 0xf5b041 });
const mPlayerL  = new THREE.MeshLambertMaterial({ color: 0x2c3e50 });
const mCoin     = new THREE.MeshLambertMaterial({ color: 0xf9d71c, emissive: 0x604000 });
const TRAIN_COLORS = [0xe74c3c, 0x27ae60, 0x2980b9, 0xe67e22, 0x8e44ad];

// ── PLAYER MESH ──────────────────────────────────────────────────────────────
const playerGroup = new THREE.Group();
scene.add(playerGroup);

// Torso
const torsoGeo = new THREE.BoxGeometry(0.7, 1.0, 0.4);
const torso = new THREE.Mesh(torsoGeo, mPlayer);
torso.position.y = PLAYER_H;
torso.castShadow = true;
playerGroup.add(torso);

// Head
const headGeo = new THREE.BoxGeometry(0.55, 0.55, 0.55);
const head = new THREE.Mesh(headGeo, mPlayerH);
head.position.y = PLAYER_H + 0.78;
head.castShadow = true;
playerGroup.add(head);

// Legs
const legGeo = new THREE.BoxGeometry(0.28, 0.85, 0.32);
const legL = new THREE.Mesh(legGeo, mPlayerL);
legL.position.set(-0.22, PLAYER_H * 0.28, 0);
legL.castShadow = true;
playerGroup.add(legL);
const legR = legL.clone();
legR.position.x = 0.22;
playerGroup.add(legR);

// ── WORLD OBJECTS ─────────────────────────────────────────────────────────────
let groundTiles = [];
let buildingObjs = [];

function buildWorld() {
  // Ground tiles (repeating)
  const tileGeo = new THREE.PlaneGeometry(12, 20);
  tileGeo.rotateX(-Math.PI / 2);
  for (let i = 0; i < 10; i++) {
    const tile = new THREE.Mesh(tileGeo, mGround);
    tile.receiveShadow = true;
    tile.position.z = i * 20;
    scene.add(tile);
    groundTiles.push(tile);
  }

  // Track center strip
  const trackGeo = new THREE.PlaneGeometry(LANE_W * 3 - 0.4, 200);
  trackGeo.rotateX(-Math.PI / 2);
  const track = new THREE.Mesh(trackGeo, mTrack);
  track.receiveShadow = true;
  track.position.set(0, 0.01, 100);
  scene.add(track);

  // Rails
  const railGeo = new THREE.BoxGeometry(0.08, 0.12, 200);
  for (let r = -1; r <= 1; r++) {
    const rail = new THREE.Mesh(railGeo, mRail);
    rail.position.set(r * LANE_W, 0.08, 100);
    scene.add(rail);
  }

  // City buildings (static backdrop)
  buildBuildings();
}

function buildBuildings() {
  const bMat = new THREE.MeshLambertMaterial({ color: 0x0d0820 });
  const wMat = new THREE.MeshLambertMaterial({ color: 0xffd080, emissive: 0x302000 });
  const sides = [-1, 1];
  for (const side of sides) {
    for (let z = 0; z < 200; z += 15 + Math.random() * 20) {
      const w = 3 + Math.random() * 6;
      const h = 8 + Math.random() * 25;
      const d = 3 + Math.random() * 5;
      const geo = new THREE.BoxGeometry(w, h, d);
      const b = new THREE.Mesh(geo, bMat);
      b.position.set(side * (8 + Math.random() * 4), h / 2, z);
      scene.add(b);
      buildingObjs.push(b);

      // Random lit windows
      const wGeo = new THREE.BoxGeometry(0.4, 0.6, 0.05);
      for (let wy = 1; wy < h - 1; wy += 2) {
        for (let wx = -w/2 + 0.8; wx < w/2 - 0.5; wx += 1.2) {
          if (Math.random() > 0.45) continue;
          const win = new THREE.Mesh(wGeo, wMat);
          win.position.set(wx, wy - h/2, d / 2 + 0.03);
          b.add(win);
        }
      }
    }
  }
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let gameRunning = false;
let score = 0, coins = 0, bestScore = 0;
let distance = 0;
let worldSpeed = 14;  // units / sec
let spawnZ = 120;
let spawnTimer = 0, spawnInterval = 1.8;
let coinTimer = 0,  coinInterval = 1.0;

let player = {};
let obstacles = [];
let coinMeshes = [];

const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.key]) onKey(e.key);
  keys[e.key] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let touchX = 0, touchY = 0;
canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (!gameRunning) { startGame(); return; }
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30) moveLane(1); else if (dx < -30) moveLane(-1);
  } else {
    if (dy < -30) doJump(); else if (dy > 30) doSlide();
  }
}, { passive: true });

function onKey(k) {
  if (!gameRunning) return;
  if (k === 'ArrowLeft'  || k === 'a' || k === 'A') moveLane(-1);
  if (k === 'ArrowRight' || k === 'd' || k === 'D') moveLane(1);
  if (k === 'ArrowUp'    || k === 'w' || k === 'W' || k === ' ') doJump();
  if (k === 'ArrowDown'  || k === 's' || k === 'S') doSlide();
}

function moveLane(dir) {
  const t = Math.max(0, Math.min(2, player.lane + dir));
  if (t !== player.lane) { player.lane = t; player.targetX = laneX(t); }
}

function doJump() {
  // Allow jump if on ground or on top of a train
  if (player.vy === 0 && !player.sliding) {
    player.vy = JUMP_V;
  }
}

function doSlide() {
  if (player.groundY === GROUND_Y && player.vy === 0 && !player.sliding) {
    player.sliding = true;
    player.slideTimer = 0.55;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function clearObstacles() {
  for (const o of obstacles) scene.remove(o.mesh);
  obstacles = [];
  for (const c of coinMeshes) scene.remove(c.mesh);
  coinMeshes = [];
}

function resetPlayer() {
  player = {
    lane: 1,
    x: 0, targetX: 0,
    y: GROUND_Y,     // feet Y position
    vy: 0,
    groundY: GROUND_Y, // current ground (can be train roof)
    sliding: false,
    slideTimer: 0,
    rideTrainId: null,
  };
  playerGroup.position.set(0, 0, 0);
}

function startGame() {
  document.getElementById('title').style.display = 'none';
  document.getElementById('gameover').classList.remove('show');
  clearObstacles();
  resetPlayer();
  score = 0; coins = 0; distance = 0;
  worldSpeed = 14;
  spawnTimer = 0; spawnInterval = 1.8;
  coinTimer = 0;
  gameRunning = true;
}

// ── OBSTACLE SPAWNING ─────────────────────────────────────────────────────────
function spawnObstacles() {
  const r = Math.random();
  if (r < 0.35) {
    // Single train in one lane
    spawnTrain([Math.floor(Math.random() * 3)], false);
  } else if (r < 0.6) {
    // Two lanes blocked (one free to dodge)
    const free = Math.floor(Math.random() * 3);
    spawnTrain([0,1,2].filter(l => l !== free), false);
  } else if (r < 0.8) {
    // Rideable low train in 1-2 lanes
    const l = Math.floor(Math.random() * 3);
    spawnTrain([l], true);
  } else {
    // Gap of nothing (easier section)
  }
}

function spawnTrain(lanes, rideable) {
  for (const l of lanes) {
    const color = TRAIN_COLORS[Math.floor(Math.random() * TRAIN_COLORS.length)];
    const mat = new THREE.MeshLambertMaterial({ color });
    const trainH = rideable ? TRAIN_H : TALL_TRAIN_H;
    const len = 6 + Math.random() * 8;

    const group = new THREE.Group();

    // Main body
    const bodyGeo = new THREE.BoxGeometry(LANE_W * 0.88, trainH, len);
    const body = new THREE.Mesh(bodyGeo, mat);
    body.position.y = trainH / 2;
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);

    // Roof detail (darker)
    const roofMat = new THREE.MeshLambertMaterial({ color: new THREE.Color(color).multiplyScalar(0.7) });
    const roofGeo = new THREE.BoxGeometry(LANE_W * 0.88, 0.15, len);
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = trainH + 0.075;
    group.add(roof);

    // Windows strip
    const winMat = new THREE.MeshLambertMaterial({ color: 0x85c1e9, emissive: 0x103040 });
    const winGeo = new THREE.BoxGeometry(LANE_W * 0.82, trainH * 0.22, 0.05);
    for (const side of [-1, 1]) {
      const win = new THREE.Mesh(winGeo, winMat);
      win.position.set(side * (LANE_W * 0.44 + 0.025), trainH * 0.58, 0);
      group.add(win);
    }

    // Wheels
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
    const wheelGeo = new THREE.BoxGeometry(LANE_W * 0.9, 0.25, 0.6);
    for (const wz of [-len/2 + 0.8, len/2 - 0.8]) {
      const w = new THREE.Mesh(wheelGeo, wheelMat);
      w.position.set(0, 0.125, wz);
      group.add(w);
    }

    // Rideable indicator strip
    if (rideable) {
      const stripMat = new THREE.MeshLambertMaterial({ color: 0xf9d71c, emissive: 0x604000 });
      const stripGeo = new THREE.BoxGeometry(LANE_W * 0.88, 0.08, len);
      const strip = new THREE.Mesh(stripGeo, stripMat);
      strip.position.y = trainH + 0.16;
      group.add(strip);
    }

    group.position.set(laneX(l), 0, spawnZ);
    scene.add(group);

    obstacles.push({
      mesh: group,
      lane: l,
      z: spawnZ,
      len,
      trainH,
      rideable,
      id: Math.random(),
      active: true,
    });
  }
}

function spawnCoinRow() {
  const l = Math.floor(Math.random() * 3);
  const count = 3 + Math.floor(Math.random() * 4);
  const spacing = 2.5;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.28, 8, 6);
    const mesh = new THREE.Mesh(geo, mCoin);
    const cz = spawnZ + i * spacing;
    mesh.position.set(laneX(l), 1.6, cz);
    mesh.castShadow = true;
    scene.add(mesh);
    coinMeshes.push({ mesh, lane: l, z: cz, collected: false });
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
let prevT = 0;
function update(t) {
  if (!gameRunning) return;
  const dt = Math.min((t - prevT) / 1000, 0.05);
  prevT = t;

  // Speed ramp
  worldSpeed = 14 + distance * 0.003;
  spawnInterval = Math.max(0.9, 1.8 - distance * 0.001);
  const dz = worldSpeed * dt;

  distance += dz;
  score = Math.floor(distance * 2);

  // Player X lerp
  player.x += (player.targetX - player.x) * Math.min(1, dt * 20);

  // Determine ground beneath player
  // Check if standing/landing on a train
  let newGroundY = GROUND_Y;
  let rideId = null;
  for (const o of obstacles) {
    if (!o.active) continue;
    if (o.lane !== player.lane) continue;
    const relZ = o.z; // obstacle world Z relative (player stays at 0)
    const halfLen = o.len / 2;
    // Is player above this train's footprint?
    if (relZ > -halfLen - 1 && relZ < halfLen + 2) {
      // Player feet are close to the top of the train
      const roofY = o.trainH;
      if (o.rideable && player.y >= roofY - 0.3 && player.vy >= 0) {
        newGroundY = roofY;
        rideId = o.id;
      }
    }
  }
  player.groundY = newGroundY;
  player.rideTrainId = rideId;

  // Gravity
  player.y += player.vy * dt;
  player.vy -= GRAV * dt;

  // Land
  if (player.y <= player.groundY) {
    player.y = player.groundY;
    player.vy = 0;
  }

  // Slide timer
  if (player.sliding) {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0) { player.sliding = false; }
  }

  // Move world toward player
  for (const o of obstacles) {
    o.z -= dz;
    o.mesh.position.z -= dz;
  }
  for (const c of coinMeshes) {
    c.z -= dz;
    c.mesh.position.z -= dz;
    // Spin
    c.mesh.rotation.y += dt * 3;
  }
  // Ground tiles scroll
  for (const tile of groundTiles) {
    tile.position.z -= dz;
    if (tile.position.z < -20) tile.position.z += groundTiles.length * 20;
  }

  // Spawn
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) { spawnTimer = 0; spawnObstacles(); }
  coinTimer += dt;
  if (coinTimer >= coinInterval) { coinTimer = 0; spawnCoinRow(); }

  // Collision vs obstacles
  for (const o of obstacles) {
    if (!o.active) continue;
    if (o.lane !== player.lane) continue;
    const halfLen = o.len / 2;
    if (o.z > -halfLen - 0.5 && o.z < halfLen) {
      // Player is in the train's z-span
      const playerFeet  = player.y;
      const playerHead  = player.y + (player.sliding ? PLAYER_H * 0.55 : PLAYER_H * 2);
      const trainBottom = 0;
      const trainTop    = o.trainH;

      // If player can ride on top — no collision if they're ON TOP
      if (o.rideable && playerFeet >= trainTop - 0.2) continue;

      // Collision: player overlaps train volume
      if (playerFeet < trainTop && playerHead > trainBottom) {
        // Allow clearing if jumping very high over it
        if (playerFeet >= trainTop - 0.1) continue;
        triggerDeath();
        return;
      }
    }
  }

  // Collect coins
  for (const c of coinMeshes) {
    if (c.collected) continue;
    if (c.lane !== player.lane) continue;
    if (Math.abs(c.z) < 1.2 && Math.abs(c.mesh.position.y - (player.y + PLAYER_H)) < 1.5) {
      c.collected = true;
      c.mesh.visible = false;
      coins++;
    }
  }

  // Remove far obstacles/coins
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].z < -12) { scene.remove(obstacles[i].mesh); obstacles.splice(i, 1); }
  }
  for (let i = coinMeshes.length - 1; i >= 0; i--) {
    if (coinMeshes[i].z < -5) { scene.remove(coinMeshes[i].mesh); coinMeshes.splice(i, 1); }
  }

  // Update player mesh
  const slideScale = player.sliding ? 0.45 : 1;
  playerGroup.position.set(player.x, player.y, 0);
  playerGroup.scale.y = slideScale;

  // Leg animation
  const legSwing = player.vy === 0 ? Math.sin(t * 0.018) * 0.4 : 0;
  legL.rotation.x = legSwing;
  legR.rotation.x = -legSwing;

  // Camera follows player X, hovers behind/above
  const camTargetX = player.x * 0.5;
  camera.position.x += (camTargetX - camera.position.x) * 0.1;
  camera.position.y = 7 + player.y * 0.5;
  camera.lookAt(player.x * 0.3, player.y + 2, 8);

  // Light follows
  fillLight.position.x = player.x;

  // HUD
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('coins-hud').textContent = `🪙 ${coins}`;
  const onTrain = player.groundY > GROUND_Y;
  document.getElementById('info-top').textContent = onTrain ? '▲ RIDING TRAIN' : '';
}

// ── DEATH ─────────────────────────────────────────────────────────────────────
function triggerDeath() {
  gameRunning = false;
  if (score > bestScore) bestScore = score;
  document.getElementById('go-stats').innerHTML =
    `score: ${score.toLocaleString()}&nbsp; · &nbsp;coins: ${coins}`;
  document.getElementById('go-best').textContent = `best: ${bestScore.toLocaleString()}`;
  document.getElementById('gameover').classList.add('show');
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
buildWorld();

function loop(t) {
  requestAnimationFrame(loop);
  update(t);
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
